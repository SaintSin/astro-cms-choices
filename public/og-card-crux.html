<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1200" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				width: 1200px;
				height: 630px;
				overflow: hidden;
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
				background: #0b0e1a;
				color: #fff;
			}

			.card {
				width: 1200px;
				height: 630px;
				position: relative;
				display: flex;
				flex-direction: column;
				padding: 64px 72px;
				background: #0b0e1a;
				overflow: hidden;
			}

			.bg-glow {
				position: absolute;
				top: -180px;
				right: -120px;
				width: 700px;
				height: 700px;
				border-radius: 50%;
				background: radial-gradient(
					circle,
					rgba(16, 185, 129, 0.16) 0%,
					rgba(16, 185, 129, 0.04) 55%,
					transparent 70%
				);
				pointer-events: none;
			}
			.bg-glow-2 {
				position: absolute;
				bottom: -200px;
				left: -100px;
				width: 500px;
				height: 500px;
				border-radius: 50%;
				background: radial-gradient(
					circle,
					rgba(6, 182, 212, 0.07) 0%,
					transparent 65%
				);
				pointer-events: none;
			}
			.grid-lines {
				position: absolute;
				inset: 0;
				background-image:
					linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
					linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
				background-size: 60px 60px;
				pointer-events: none;
			}

			.top {
				display: flex;
				align-items: center;
				gap: 14px;
				margin-bottom: 40px;
			}
			.badge {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				background: rgba(16, 185, 129, 0.12);
				border: 1px solid rgba(16, 185, 129, 0.3);
				border-radius: 999px;
				padding: 6px 16px;
				font-size: 15px;
				color: #6ee7b7;
				font-weight: 500;
				letter-spacing: 0.01em;
			}
			.badge-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #10b981;
			}

			.headline {
				flex: 1;
			}
			.title {
				font-size: 72px;
				font-weight: 800;
				line-height: 1.05;
				letter-spacing: -0.03em;
				background: linear-gradient(135deg, #fff 30%, #6ee7b7 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				margin-bottom: 20px;
			}
			.subtitle {
				font-size: 26px;
				color: #94a3b8;
				font-weight: 400;
				line-height: 1.4;
				max-width: 620px;
			}

			.stats {
				display: flex;
				gap: 0;
				margin-top: auto;
				margin-bottom: 40px;
			}
			.stat {
				display: flex;
				flex-direction: column;
				gap: 4px;
				padding-right: 40px;
				margin-right: 40px;
				border-right: 1px solid rgba(255, 255, 255, 0.08);
			}
			.stat:last-child {
				border-right: none;
			}
			.stat-value {
				font-size: 36px;
				font-weight: 700;
				color: #fff;
				letter-spacing: -0.02em;
			}
			.stat-value.green {
				color: #6ee7b7;
			}
			.stat-value.cyan {
				color: #38bdf8;
			}
			.stat-label {
				font-size: 14px;
				color: #64748b;
				font-weight: 500;
				text-transform: uppercase;
				letter-spacing: 0.06em;
			}

			/* CWV pass rate bar */
			.bar-strip {
				display: flex;
				gap: 3px;
				height: 6px;
				border-radius: 999px;
				overflow: hidden;
				margin-bottom: 32px;
			}
			.bar-segment {
				height: 100%;
				border-radius: 999px;
			}

			.bottom {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.url {
				font-size: 18px;
				color: #475569;
				font-weight: 400;
				font-family: "SF Mono", "Fira Code", monospace;
			}
			.metric-pills {
				display: flex;
				gap: 8px;
			}
			.pill {
				font-size: 13px;
				font-weight: 600;
				padding: 5px 16px;
				border-radius: 999px;
				white-space: nowrap;
			}
			.pill-green {
				background: rgba(16, 185, 129, 0.12);
				color: #6ee7b7;
				border: 1px solid rgba(16, 185, 129, 0.28);
			}
			.pill-amber {
				background: rgba(251, 191, 36, 0.1);
				color: #fde68a;
				border: 1px solid rgba(251, 191, 36, 0.25);
			}
			.pill-blue {
				background: rgba(59, 130, 246, 0.12);
				color: #93c5fd;
				border: 1px solid rgba(59, 130, 246, 0.25);
			}
			.pill-slate {
				background: rgba(100, 116, 139, 0.15);
				color: #94a3b8;
				border: 1px solid rgba(100, 116, 139, 0.3);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<div class="bg-glow"></div>
			<div class="bg-glow-2"></div>
			<div class="grid-lines"></div>

			<div class="top">
				<div class="badge">
					<div class="badge-dot"></div>
					Astro Showcase
				</div>
			</div>

			<div class="headline">
				<div class="title">Core Web Vitals</div>
				<div class="subtitle">
					Real-user Chrome field data for confirmed Astro showcase sites — LCP,
					INP, CLS, and CWV pass rates.
				</div>
			</div>

			<div class="stats">
				<div class="stat">
					<div class="stat-value">514</div>
					<div class="stat-label">Desktop sites</div>
				</div>
				<div class="stat">
					<div class="stat-value">435</div>
					<div class="stat-label">Phone sites</div>
				</div>
				<div class="stat">
					<div class="stat-value green">382</div>
					<div class="stat-label">Desktop CWV pass</div>
				</div>
				<div class="stat">
					<div class="stat-value cyan">253</div>
					<div class="stat-label">Phone CWV pass</div>
				</div>
			</div>

			<!-- Desktop CWV pass rate: 382/514 = 74% pass, 26% fail -->
			<div class="bar-strip">
				<div class="bar-segment" style="flex: 382; background: #10b981"></div>
				<div class="bar-segment" style="flex: 132; background: #1e3a2f"></div>
			</div>

			<div class="bottom">
				<div class="url">astro-what-cms.netlify.app/crux/</div>
				<div class="metric-pills">
					<span class="pill pill-green">LCP</span>
					<span class="pill pill-amber">INP</span>
					<span class="pill pill-blue">CLS</span>
					<span class="pill pill-slate">28-day field data</span>
				</div>
			</div>
		</div>
	</body>
</html>
